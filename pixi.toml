[workspace]
name = "splatam"
version = "0.1.0"
description = "SplaTAM with CUDA 13.0 / PyTorch 2.9"
channels = ["conda-forge"]
platforms = ["linux-64"]

[system-requirements]
cuda = "13.0"
linux = "6.0"

[dependencies]
python = "3.10.*"
pip = "*"
compilers = "*"
numpy = "<2"

[pypi-dependencies]
torch = { version = "==2.9.0", index = "https://download.pytorch.org/whl/cu130" }
torchvision = { version = ">=0.20", index = "https://download.pytorch.org/whl/cu130" }
tqdm = ">=4.65"
Pillow = "*"
opencv-python = "*"
imageio = "*"
matplotlib = "*"
kornia = "*"
natsort = "*"
pyyaml = "*"
wandb = "*"
lpips = "*"
open3d = ">=0.17"
torchmetrics = "*"
pytorch-msssim = "*"
plyfile = "==0.8.1"
